version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ensemble-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ensemble-ollama
    restart: always
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  fastapi:
    build: ./backend
    container_name: ensemble-fastapi
    restart: always
    ports:
      - "${FASTAPI_PORT}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
      - OLLAMA_HOST=http://ollama:11434
    env_file:
      - .env                   
    depends_on:
      - postgres
      - ollama
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  ollama_data: